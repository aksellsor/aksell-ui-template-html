<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{project-name}}</title>
  <link rel="stylesheet" href="https://unpkg.com/@aksell/ui/src/styles/resets.css" />
  <link rel="stylesheet" href="https://unpkg.com/@aksell/ui/src/styles/colors.css" />
  <link rel="stylesheet" href="https://unpkg.com/@aksell/ui/src/styles/typography.css" />
  <link rel="stylesheet" href="https://unpkg.com/@aksell/ui/src/styles/buttons.css" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="container">
    <h1>{{project-name}}</h1>

    <section>
      <h2>Buttons</h2>
      <div class="btn-row">
        <button class="btn btn--primary">Save</button>
        <button class="btn btn--secondary">Secondary</button>
        <button class="btn btn--accent">Accent</button>
        <button class="btn btn--dark">Dark</button>
        <button class="btn btn--light">Light</button>
      </div>
      <div class="btn-row">
        <button class="btn btn--danger">Delete</button>
        <button class="btn btn--success">Confirm</button>
        <button class="btn btn--warning">Warning</button>
      </div>
      <div class="btn-row">
        <button class="btn btn--primary btn--outline">Outline</button>
        <button class="btn btn--primary btn--sm">Small</button>
        <button class="btn btn--ghost">Ghost</button>
        <button class="btn btn--dark btn--outline">Dark outline</button>
      </div>
    </section>
  </main>

  <script type="module" src="main.js"></script>
</body>
</html>
